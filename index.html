<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 20px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
    }

    .thumbnail {
      width: 100%;
      height: 0;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                  url('https://picsum.photos/id/1015/1280/720') center/cover;
      position: relative;
      cursor: pointer;
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: 90px;
      background: rgba(255, 0, 0, 0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(255, 0, 0, 0.5);
      transition: all 0.3s ease;
    }

    .play-button:hover {
      transform: translate(-50%, -50%) scale(1.1);
      background: #ff0000;
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      border-left: 30px solid white;
      margin-left: 8px;
    }

    .title {
      text-align: center;
      margin-top: 25px;
      font-size: 28px;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      color: #aaaaaa;
      margin-top: 8px;
      font-size: 18px;
    }

    .fake-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 15px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-wrapper">
      <div class="thumbnail" id="thumbnail">
        <div class="play-button" id="playBtn">
          <div class="play-icon"></div>
        </div>
        
        <!-- Fake video controls -->
        <div class="fake-controls">
          <div style="width: 30px; height: 30px; background: white; border-radius: 50%;"></div>
          <div style="flex: 1; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px;">
            <div style="width: 45%; height: 100%; background: #ff0000; border-radius: 3px;"></div>
          </div>
          <div style="color: white; font-size: 14px;">00:45 / 12:30</div>
        </div>
      </div>
    </div>

    <h1 class="title">Tonton Video Ini Sekarang</h1>
    <p class="subtitle">Klik tombol play untuk memutar video lengkap</p>
  </div>

  <script>
    document.getElementById('playBtn').addEventListener('click', function() {
      // Langsung redirect ke link yang kamu berikan
      window.location.href = "https://jackknifemonuments.com/jv8xiueh?key=d2505f9b9a140229096fea80f3d15101";
    });

    // Optional: Klik di area thumbnail juga bisa play
    document.getElementById('thumbnail').addEventListener('click', function(e) {
      // Agar tidak double trigger kalau klik tombol play
      if (e.target.id !== 'playBtn') {
        window.location.href = "https://jackknifemonsters.com/jv8xiueh?key=d2505f9b9a140229096fea80f3d15101";
      }
    });
  </script>
</body>
</html>
