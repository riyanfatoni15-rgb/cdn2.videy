<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videy Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
        #videoContainer {
            max-width: 820px;
            margin: 30px auto;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }
        #videyPlayer { width: 100%; height: auto; display: block; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-4xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 bg-violet-600 rounded-2xl flex items-center justify-center text-2xl">🎬</div>
            <div>
                <h1 class="text-3xl font-semibold">Videy Link Generator</h1>
                <p class="text-zinc-400">cdn.videy.co → cdn2-videy.vercel.app</p>
            </div>
        </div>

        <!-- Input Section -->
        <div class="glass border border-white/10 rounded-3xl p-8 mb-8">
            <h2 class="text-xl font-medium mb-4 flex items-center gap-2">
                <i class="fas fa-link"></i> Masukkan Link Videy (bulk)
            </h2>
            <textarea id="input" rows="8" class="w-full bg-zinc-900 border border-white/10 focus:border-violet-500 rounded-2xl p-5 font-mono text-sm resize-none focus:outline-none"
                placeholder="cdn2.videy.co/MiUGK1111.mp4"></textarea>

            <div class="flex gap-3 mt-6">
                <button onclick="generateLinks()" class="flex-1 bg-violet-600 hover:bg-violet-700 py-4 rounded-2xl font-medium flex items-center justify-center gap-2 text-lg">
                    <i class="fas fa-magic"></i> GENERATE LINKS
                </button>
                <button onclick="clearAll()" class="px-8 bg-white/10 hover:bg-white/20 rounded-2xl">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>

        <!-- Hasil Generate -->
        <div id="resultSection" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-medium">Hasil <span id="summary" class="text-sm font-normal text-zinc-400"></span></h2>
                <button onclick="copyAll()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-2xl text-sm">
                    <i class="fas fa-copy"></i> Copy Semua Valid
                </button>
            </div>
            <div id="results" class="space-y-3"></div>
        </div>

        <!-- VIDEO PLAYER UTAMA (untuk short link & generate) -->
        <div id="videoContainer" class="hidden glass border border-white/10 rounded-3xl p-4">
            <h3 class="text-lg font-medium mb-3 flex items-center gap-2">
                <i class="fas fa-play-circle"></i> Video Player
            </h3>
            <video id="videyPlayer" controls controlsList="nodownload" playsinline></video>
            <div id="videoStatus" class="text-xs text-amber-400 mt-3 text-center"></div>
        </div>
    </div>

    <script>
        let directAdShown = false;
        let popunderLoaded = false;
        let video = null;
        let firstPlay = true;

        // === IKLAN ===
        function showDirectAd() {
            if (directAdShown) return;
            directAdShown = true;
            window.open('https://jackknifemonuments.com/jv8xiueh?key=d2505f9b9a140229096fea80f3d15101', '_blank');
        }

        function loadPopunder() {
            if (popunderLoaded) return;
            popunderLoaded = true;
            const script = document.createElement('script');
            script.src = 'https://jackknifemonuments.com/1c/40/2f/1c402f87e1467c8b050b8be198fe179e.js';
            document.head.appendChild(script);
        }

        // === PLAY VIDEO DENGAN IKLAN ===
        function playVideo(filename) {
            const container = document.getElementById('videoContainer');
            video = document.getElementById('videyPlayer');
            const status = document.getElementById('videoStatus');

            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth' });

            video.src = `https://cdn2.videy.co/${filename}`;
            status.textContent = 'Memuat video...';

            // Trigger iklan saat pertama kali play
            video.addEventListener('play', () => {
                if (firstPlay) {
                    firstPlay = false;
                    showDirectAd();
                    setTimeout(loadPopunder, 1000);
                }
            }, { once: true });

            video.onerror = () => {
                status.innerHTML = `Gagal memuat.<br><a href="https://cdn2.videy.co/${filename}" target="_blank" class="text-violet-400">Coba buka manual</a>`;
            };
        }

        // === CEK APAKAH INI SHORT LINK LANGSUNG ===
        function checkIfShortLink() {
            const path = window.location.pathname;
            if (path && path !== '/' && path.endsWith('.mp4')) {
                const filename = path.substring(1);
                // Langsung tampilkan player + siapkan iklan
                setTimeout(() => {
                    playVideo(filename);
                }, 500);
            }
        }

        // === Generate Links ===
        function isValidVideyUrl(url) {
            try {
                let trimmed = url.trim();
                if (!trimmed) return { valid: false, reason: "Link kosong" };
                if (!trimmed.startsWith('http')) trimmed = 'https://' + trimmed;
                const u = new URL(trimmed);
                if (!u.hostname.includes('videy.co')) return { valid: false, reason: "Bukan link Videy" };
                let fn = u.pathname.split('/').pop().split('?')[0];
                if (!fn.toLowerCase().endsWith('.mp4')) fn += '.mp4';
                if (fn.replace('.mp4','').length < 4) return { valid: false, reason: "ID terlalu pendek" };
                return { valid: true, filename: fn };
            } catch (e) {
                return { valid: false, reason: "Format tidak valid" };
            }
        }

        function generateLinks() {
            const text = document.getElementById('input').value.trim();
            if (!text) return alert("Masukkan link dulu!");

            const lines = text.split('\n');
            const div = document.getElementById('results');
            div.innerHTML = '';
            let valid = 0, invalid = 0;

            lines.forEach(line => {
                if (!line.trim()) return;
                const v = isValidVideyUrl(line);
                if (v.valid) {
                    valid++;
                    const short = `cdn2-videy.vercel.app/${v.filename}`;
                    div.innerHTML += `
                    <div class="glass border border-white/10 rounded-2xl p-5 flex justify-between items-center">
                        <div class="flex-1">
                            <a href="#" onclick="playVideo('${v.filename}'); return false;" class="font-mono text-violet-300 hover:text-white break-all block">
                                ${short}
                            </a>
                            <div class="text-xs text-emerald-400 mt-1">✓ Valid • Klik untuk putar</div>
                        </div>
                        <button onclick="copySingle(this, '${short}')" class="ml-4 px-6 py-3 bg-white/10 hover:bg-white/20 rounded-2xl text-sm">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>`;
                } else {
                    invalid++;
                    div.innerHTML += `<div class="invalid glass border rounded-2xl p-5"><div class="font-mono text-red-300 break-all">${line}</div><div class="text-xs text-red-400 mt-1">✗ ${v.reason}</div></div>`;
                }
            });

            document.getElementById('summary').innerHTML = `<span class="text-emerald-400">${valid} valid</span> • ${invalid} invalid`;
            document.getElementById('resultSection').classList.remove('hidden');
        }

        function copySingle(btn, text) {
            navigator.clipboard.writeText(text);
            const ori = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-check text-emerald-400"></i>`;
            setTimeout(() => btn.innerHTML = ori, 1500);
        }

        function copyAll() {
            const links = Array.from(document.querySelectorAll('#results a')).map(a => a.textContent.trim()).join('\n');
            if (links) navigator.clipboard.writeText(links).then(() => alert("✅ Sudah dicopy!"));
        }

        function clearAll() {
            if (confirm("Hapus semua?")) location.reload();
        }

        // Init
        window.onload = () => {
            checkIfShortLink();
        };

        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generateLinks();
        });
    </script>
</body>
</html>
