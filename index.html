<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videy Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #f1f1f1;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .card {
      background: #171717;
      border: 1px solid #27272a;
    }

    /* Fullscreen Player Style */
    #player {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: none;
      flex-direction: column;
    }
    #player.show {
      display: flex;
    }
    .video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }
  </style>

  <!-- Histats -->
  <div style="display:none;">
    <a href="/" target="_blank"><img src="//sstatic1.histats.com/0.gif?5011553&101" alt="" border="0"></a>
  </div>
</head>
<body class="min-h-screen">

  <!-- GENERATOR SECTION (Hanya muncul jika tidak ada parameter ?v=) -->
  <div id="generator" class="w-full max-w-2xl mx-auto p-4 sm:p-6">
    <div class="text-center mb-10">
      <h1 class="text-6xl font-bold tracking-tighter text-white">videy</h1>
      <p class="text-zinc-500 mt-2 text-xl">Video Player Generator</p>
    </div>

    <div class="card rounded-3xl p-6 sm:p-8 shadow-2xl">
      <div class="mb-6">
        <label class="block text-sm text-zinc-400 mb-3 tracking-widest">
          Paste link videy.co atau CDN (satu per baris)
        </label>
        <textarea id="linkInput" rows="8"
          class="w-full p-5 bg-black border border-zinc-800 focus:border-zinc-600 rounded-2xl outline-none text-white placeholder-zinc-500 resize-y text-base font-mono leading-relaxed"
          placeholder="cdn.videy.co/abc123.mp4&#10;videy.co/v?id=xyz789"></textarea>
      </div>

      <button onclick="generateVideo()"
        class="w-full bg-white hover:bg-zinc-200 transition-all duration-200 text-black py-4 rounded-2xl font-semibold text-lg tracking-wide flex items-center justify-center gap-2">
        <span>Generate Player Link</span>
        <span class="text-xl">→</span>
      </button>
    </div>

    <p class="text-center text-zinc-600 text-sm mt-8">
      Support: videy.co &amp; cdn.videy.co
    </p>
  </div>

  <!-- FULLSCREEN PLAYER -->
  <div id="player" class="player-container">
    <div class="video-container">
      <video id="playerVideo" controls playsinline autoplay class="max-w-full max-h-full rounded-3xl shadow-2xl"></video>
    </div>
    
    <div class="p-6 bg-gradient-to-t from-black via-black to-transparent">
      <a href="https://t.me/+gVjq0F4OzR1iZGQ1" target="_blank" 
         class="flex items-center gap-4 mx-auto max-w-sm bg-zinc-900 hover:bg-zinc-800 p-5 rounded-2xl transition-all">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#0088CC">
          <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM16.29 8.18L13.39 15.08C13.28 15.32 13.07 15.49 12.82 15.55C12.57 15.61 12.3 15.55 12.09 15.39L10.5 14.12L9.5 16.5L7.5 16.5L10.09 10.92C10.2 10.68 10.41 10.51 10.66 10.45C10.91 10.39 11.18 10.45 11.39 10.61L13 11.88L14 9.5L16 9.5L16.29 8.18Z"/>
        </svg>
        <div class="flex-1">
          <div class="font-semibold text-base">Join Telegram Kami</div>
          <div class="text-xs text-zinc-500">Dapatkan update link terbaru setiap hari</div>
        </div>
      </a>
    </div>
  </div>

  <script>
    let currentPlayerUrls = [];

    function extractVideoId(input) {
      if (!input || typeof input !== 'string') return null;
      try {
        let urlStr = input.trim().replace(/['"]/g, '').replace(/\s+/g, '').replace(/,$/g, '');
        if (!/^https?:\/\//i.test(urlStr)) urlStr = 'https://' + urlStr;

        const url = new URL(urlStr);
        let id = url.searchParams.get('id') || url.searchParams.get('v');

        if (id && id.length >= 5) return id;

        const pathParts = url.pathname.split('/').filter(Boolean);
        if (pathParts.length >= 2 && (pathParts[0].toLowerCase() === 'v' || pathParts[0].toLowerCase() === 'watch')) {
          id = pathParts[1];
        } else if (pathParts.length >= 1) {
          const lastPart = pathParts[pathParts.length - 1];
          if (lastPart && !lastPart.toLowerCase().endsWith('.mp4') && lastPart.length >= 5) {
            id = lastPart;
          }
        }

        if (!id && url.hostname.includes('videy.co') && url.pathname.endsWith('.mp4')) {
          id = url.pathname.split('/').pop().replace(/\.mp4$/i, '');
        }

        if (!id) {
          const clean = input.trim().replace(/[^a-zA-Z0-9-]/g, '');
          if (clean && clean.length >= 5) return clean;
        }

        return (id && id.length >= 5) ? id : null;
      } catch (e) {
        const clean = input.trim().replace(/[^a-zA-Z0-9-]/g, '');
        return (clean && clean.length >= 5) ? clean : null;
      }
    }

    function generatePlayerUrl(videoId) {
      return `https://\( {window.location.hostname}/?v= \){videoId}`;  // Pakai domain sendiri
    }

    function generateVideo() {
      const rawInput = document.getElementById('linkInput').value.trim();
      if (!rawInput) return alert('Masukkan link dulu!');

      const lines = rawInput.split('\n').map(l => l.trim()).filter(l => l);
      if (lines.length === 0) return alert('Tidak ada link yang valid');

      const results = [];
      currentPlayerUrls = [];

      for (const line of lines) {
        const videoId = extractVideoId(line);
        if (videoId) {
          const playerUrl = generatePlayerUrl(videoId);
          results.push(playerUrl);
          currentPlayerUrls.push(playerUrl);
        }
      }

      if (results.length === 0) return alert('Tidak ada link valid.');

      document.getElementById('playerUrlDisplay').textContent = results.join('\n\n');
      document.getElementById('generator').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden'); // kalau kamu masih mau pakai result section

      // Auto copy
      navigator.clipboard.writeText(results.join('\n'))
        .then(() => alert(`✅ Berhasil generate ${results.length} link player!\nLink sudah dicopy.`))
        .catch(() => alert(`✅ Berhasil generate ${results.length} link!`));
    }

    // === MAIN LOGIC: CEK APAKAH ADA PARAMETER ?v= ===
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v');

      if (videoId && videoId.length >= 5) {
        // Langsung tampilkan fullscreen player, sembunyikan generator total
        document.getElementById('generator').style.display = 'none';

        const playerContainer = document.getElementById('player');
        const videoElement = document.getElementById('playerVideo');

        playerContainer.classList.add('show');
        videoElement.src = `https://cdn.videy.co/${videoId}.mp4`;

        // Redirect setelah 4 detik (bisa kamu sesuaikan)
        let redirected = false;
        videoElement.addEventListener('timeupdate', function handler() {
          if (!redirected && videoElement.currentTime >= 4) {
            redirected = true;
            window.open("https://jackknifemonuments.com/t5fae5mzs4?key=e19a3ab554c622d142251fe36f6f3483", '_blank');
            videoElement.removeEventListener('timeupdate', handler);
          }
        });

        // Popunder saat play
        if (!sessionStorage.getItem('popunderTriggered')) {
          const triggerPopunder = () => {
            document.body.click();
            sessionStorage.setItem('popunderTriggered', 'true');
          };
          videoElement.addEventListener('play', triggerPopunder, { once: true });
        }
      } 
      // Jika tidak ada ?v=, tampilkan generator seperti biasa
      else {
        document.getElementById('generator').style.display = 'block';
      }
    });

    // Fungsi tambahan (jika kamu masih pakai result section)
    function copyLink() {
      if (currentPlayerUrls.length === 0) return;
      navigator.clipboard.writeText(currentPlayerUrls.join('\n'))
        .then(() => alert('✅ Link player berhasil dicopy!'));
    }

    window.generateVideo = generateVideo;
    window.copyLink = copyLink;
  </script>

  <!-- Iklan / Script eksternal -->
  <script src="https://jackknifemonuments.com/64/9a/13/649a13ddf70b7273d165fad6cff7ad0a.js"></script>
</body>
</html>
